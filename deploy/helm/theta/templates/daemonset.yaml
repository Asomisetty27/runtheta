apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "theta.fullname" . }}
  labels:
    {{- include "theta.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "theta.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "theta.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "theta.serviceAccountName" . }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      {{- if .Values.gpu.enabled }}
      {{- with .Values.gpu.runtimeClassName }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- with .Values.gpu.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gpu.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      containers:
        - name: theta
          image: {{ include "theta.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - monitor
            {{- if not .Values.gpu.enabled }}
            # The chart's no-GPU profile is intentionally demo telemetry.
            # Keep that choice explicit so production monitor startup never
            # turns an unavailable driver into plausible synthetic metrics.
            - --demo
            {{- end }}
            - --interval
            - {{ .Values.agent.interval | quote }}
            - --port
            - {{ .Values.agent.metricsPort | quote }}
            - --log
            - {{ .Values.agent.logPath }}
          env:
            - name: THETA_INTERVAL
              value: {{ .Values.agent.interval | quote }}
            - name: THETA_PROMETHEUS_PORT
              value: {{ .Values.agent.metricsPort | quote }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- with .Values.agent.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.agent.metricsPort }}
              protocol: TCP
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 30
          volumeMounts:
            - name: theta-logs
              mountPath: /var/log/theta
            - name: theta-config
              mountPath: /home/theta/.theta
      volumes:
        - name: theta-logs
          emptyDir: {}
        - name: theta-config
          emptyDir: {}
