# Gradual-strictness typing gate.
#
# Global: pragmatic — the 60-module agent predates typing enforcement, so the
# global gate catches real type errors without demanding a big-bang rewrite.
# Per-module strict list below: every NEW module ships strict from day one and
# gets added to the list (CODE_STANDARDS.md). tui.py and peer.py seed the list.
[mypy]
# 3.12, not the 3.10 floor: numpy's stubs use PEP-695 `type` statements that
# mypy only parses at >=3.12. Runtime 3.10/3.11 compat is proven by the test
# matrix, not the type-checker.
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
no_implicit_optional = True
warn_redundant_casts = True
check_untyped_defs = True
show_error_codes = True
ignore_missing_imports = True
follow_imports = silent

[mypy-theta.tui]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-theta.agent.peer]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-theta.agent.characterize]
disallow_untyped_defs = True
disallow_incomplete_defs = True
